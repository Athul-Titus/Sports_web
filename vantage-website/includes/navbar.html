<!--
  includes/navbar.html — VantaGe Sports Consultancy
  ====================================================
  Shared navigation fragment.

  Usage in PHP pages:
    <?php include __DIR__ . '/../includes/navbar.html'; ?>

  Active-link highlighting:
    main.js reads window.location.pathname and adds class="active"
    to whichever .navbar__link or .mobile-nav__link matches the current page.

  Smooth-scroll links:
    #performance and #science href values are handled by main.js:
    on index.html they scroll to anchor sections;
    on other pages they navigate to index.html#performance / index.html#science.

  Nav items (matching Stitch design):
    • Performance   → #performance  (smooth scroll on home, link on other pages)
    • Science       → #science      (smooth scroll on home, link on other pages)
    • Events        → services.html
    • Consultancy   → services.html
    • About         → about.html
    • Get In Touch  → contact.html  (CTA button, always red)
-->

<!-- ════════════════════════════════════════════════════════════════════════
     TOP NAVBAR
     ════════════════════════════════════════════════════════════════════════ -->
<header class="navbar" id="navbar" role="banner">
  <div class="navbar__inner">

    <!-- Wordmark -->
    <a href="/index.html" class="navbar__brand" id="navbar-brand" aria-label="VantaGe — Home">
      VANTAGE
    </a>

    <!-- Desktop nav links -->
    <nav aria-label="Primary navigation">
      <ul class="navbar__links" id="desktop-nav-links">

        <li>
          <a
            href="#performance"
            class="navbar__link"
            id="nav-performance"
            data-page="index"
            data-scroll="performance"
          >Performance</a>
        </li>

        <li>
          <a
            href="#science"
            class="navbar__link"
            id="nav-science"
            data-page="index"
            data-scroll="science"
          >Science</a>
        </li>

        <li>
          <a
            href="services.html"
            class="navbar__link"
            id="nav-events"
            data-page="services"
          >Events</a>
        </li>

        <li>
          <a
            href="services.html"
            class="navbar__link"
            id="nav-consultancy"
            data-page="services"
          >Consultancy</a>
        </li>

        <li>
          <a
            href="about.html"
            class="navbar__link"
            id="nav-about"
            data-page="about"
          >About</a>
        </li>

      </ul>
    </nav>

    <!-- CTA button — always links to contact.html -->
    <a
      href="contact.html"
      class="navbar__cta"
      id="navbar-cta"
      aria-label="Get in touch with VantaGe"
    >Get In Touch</a>

    <!-- Hamburger button — mobile only -->
    <button
      class="navbar__hamburger"
      id="hamburger-btn"
      aria-label="Toggle mobile navigation"
      aria-expanded="false"
      aria-controls="mobile-nav"
      type="button"
    >
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
    </button>

  </div>
</header>

<!-- ════════════════════════════════════════════════════════════════════════
     MOBILE NAV DRAWER
     (rendered immediately after header; positioned via CSS fixed + top: 80px)
     ════════════════════════════════════════════════════════════════════════ -->
<nav
  class="mobile-nav"
  id="mobile-nav"
  aria-label="Mobile navigation"
  aria-hidden="true"
>
  <!-- Red accent line at top -->
  <div class="mobile-nav__accent" aria-hidden="true"></div>

  <ul class="mobile-nav__links">

    <li>
      <a
        href="#performance"
        class="mobile-nav__link"
        id="mobile-nav-performance"
        data-page="index"
        data-scroll="performance"
      >Performance</a>
    </li>

    <li>
      <a
        href="#science"
        class="mobile-nav__link"
        id="mobile-nav-science"
        data-page="index"
        data-scroll="science"
      >Science</a>
    </li>

    <li>
      <a
        href="services.html"
        class="mobile-nav__link"
        id="mobile-nav-events"
        data-page="services"
      >Events</a>
    </li>

    <li>
      <a
        href="services.html"
        class="mobile-nav__link"
        id="mobile-nav-consultancy"
        data-page="services"
      >Consultancy</a>
    </li>

    <li>
      <a
        href="about.html"
        class="mobile-nav__link"
        id="mobile-nav-about"
        data-page="about"
      >About</a>
    </li>

  </ul>

  <!-- Mobile CTA -->
  <div class="mobile-nav__cta-wrap">
    <a
      href="contact.html"
      class="mobile-nav__cta"
      id="mobile-nav-cta"
    >Get In Touch</a>
  </div>
</nav>

<!-- Semi-transparent backdrop (click-to-close) -->
<div
  id="mobile-nav-backdrop"
  aria-hidden="true"
  style="
    display: none;
    position: fixed;
    inset: 0;
    z-index: 98;
    background: rgba(0,0,0,0.55);
  "
></div>
